version: '3.8'

# ============================================================
#  Metal Montaggi — Stack di Produzione
#  Avvio: docker-compose up --build -d
# ============================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: metalmontaggi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-metalmontaggi}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-strapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - metalmontaggi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-strapi} -d ${DATABASE_NAME:-metalmontaggi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Strapi CMS ───────────────────────────────────────────
  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    container_name: metalmontaggi-strapi
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-metalmontaggi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      # Strapi secrets
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      # Admin iniziale
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@metalmontaggi.it}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-MetalMontaggi@2024!}
      # Server
      HOST: 0.0.0.0
      PORT: 1337
    volumes:
      - strapi_uploads:/opt/app/public/uploads
    ports:
      - "${PORT:-1337}:1337"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metalmontaggi-net

  # ── Frontend React ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: metalmontaggi-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - strapi
    networks:
      - metalmontaggi-net

volumes:
  postgres_data:
    name: metalmontaggi-postgres-data
  strapi_uploads:
    name: metalmontaggi-strapi-uploads

networks:
  metalmontaggi-net:
    name: metalmontaggi-network
    driver: bridge

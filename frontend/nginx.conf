events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml application/xml+rss;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security + SEO headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # robots.txt e sitemap.xml — no cache per aggiornamenti rapidi
    location = /robots.txt {
      add_header Content-Type text/plain;
      add_header Cache-Control "public, max-age=86400";
      try_files $uri =404;
    }

    location = /sitemap.xml {
      add_header Content-Type application/xml;
      add_header Cache-Control "public, max-age=86400";
      try_files $uri =404;
    }

    # Proxy API calls → Strapi
    location /api/ {
      proxy_pass http://strapi:1337/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy uploads → Strapi (^~ gives priority over regex locations)
    location ^~ /uploads/ {
      proxy_pass http://strapi:1337/uploads/;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # React Router — serve index.html for all routes
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
